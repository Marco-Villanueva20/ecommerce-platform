spring:
  data:
    mongodb:
      host: localhost
      port: 27017
      database: customer_db
      username: root
      password: pass
      authentication-database: admin
server:
  port: 8091
logging:
  level:
    root: INFO
    com.marco.ms-customer: WARN
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(${spring.application.name:-}){blue} %clr(%-5level) %clr([%thread]){magenta} %clr(%logger{36}){cyan} : %msg%n"
    file: '%d{yyyy-MM-dd HH:mm:ss} - %msg%n'
  file:
    name: logs/customer-microservice.log
    max-size: 10MB
    max-history: 30

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka